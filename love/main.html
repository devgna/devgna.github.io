<!DOCTYPE html>

<head>
    <meta charset="utf-8">

    <style>

        .containerimg {
            background: url('heart-background.jpg') no-repeat center center fixed;
            background-size: cover;
            background-color: rgba(221, 221, 221, 0.333);
            border-radius: 18px;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 10px; /* Added padding for spacing */
            overflow: hidden; /* Added overflow to hide image overflow */
        }

        .item {
            text-align: center;
            backdrop-filter: blur(3px);
            background-color: rgba(255, 109, 109, 0.276);
            border-radius: 15px;
            padding: 10px;
            /* Removed cursor pointer for clickable effect */
        }

        .item h2 {
            color: white;
            text-decoration: none; /* Removed underline */
        }

        .content {
            border-radius: 18px;
            backdrop-filter: blur(24px);
            width: 100%; /* Adjusted width to fill container */
            height: 100%; /* Adjusted height to fill container */
            /* Added relative positioning for absolute image placement */
            position: relative;
            overflow: hidden; /* Added to prevent image overflow */
        }

        /* Added CSS for image styling */
        .content img {
            /* Set image to cover container */
            width: 100%;
            height: 100%;
            /* Added absolute positioning to place image within container */
            position: absolute;
            top: 0;
            left: 0;
            /* Maintain aspect ratio */
            object-fit: cover;
        }

        /* Added CSS Grid layout for grid view */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); /* Adjust minmax values as needed */
            gap: 20px; /* Adjust gap between grid items */
            padding: 20px; /* Added padding for spacing */
        }

        @media only screen and (max-width: 600px) {
            .containerimg {
                width: calc(50% - 20px); /* Adjusted width for smaller screens */
            }
        }
    </style>
</head>

<script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
        dataLayer.push(arguments);
    }
    gtag('js', new Date());

    gtag('config', 'UA-46172202-12');
</script>

<script type="text/javascript">
    // countto
    const date1 = new Date("03/01/2023");
    const date2 = new Date();
    const Difference_In_Time = date2.getTime() - date1.getTime();
    let Difference_In_Days = 0;
    if (Difference_In_Time > 0)
        Difference_In_Days = Math.ceil(Difference_In_Time / (1000 * 3600 * 24));

    if (document.getElementById('state1')) {
        document.getElementById("state1").setAttribute("countTo", Difference_In_Days.toString());
        document.getElementById("state1").innerHTML = Difference_In_Days.toString();
        const countUp = new CountUp('state1', document.getElementById("state1").getAttribute("countTo"));
        if (!countUp.error) {
            countUp.start();
        } else {
            console.error(countUp.error);
        }
    }
</script>
