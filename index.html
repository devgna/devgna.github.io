<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relationship Events</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: url('bg.gif') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            display: flex;
            background-color: rgba(221, 221, 221, 0.333);
            border-radius: 18px;
            justify-content: space-between;
            align-items: center;
            width: 80%;
            padding: 30px;
        }

        .item {
            flex: 1;
            text-align: center;
            backdrop-filter: blur(3px);
            background-color: rgba(255, 109, 109, 0.276);
            border-radius: 15px;
            padding: 20px;
            margin: 10px;
            /* Added cursor pointer for clickable effect */
            cursor: pointer;
        }

        .item h2 {
            color: white;
            
        }

        .content {
            border-radius: 18px;
            backdrop-filter: blur(24px);
            margin-top: 10px;
            height: 300px; /* Adjust the height as needed */
            /* Added relative positioning for absolute image placement */
            position: relative;
            overflow: hidden; /* Added to prevent image overflow */
        }

        /* Added CSS for image styling */
        .content img {
            /* Set image to cover container */
            width: 100%;
            height: 100%;
            /* Added absolute positioning to place image within container */
            position: absolute;
            top: 0;
            left: 0;
            /* Maintain aspect ratio */
            object-fit: cover;
        }

        @media only screen and (max-width: 600px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Wrap .item content with <a> tag for clickable effect -->
        <a href="love/main.html" class="item">
            <h2>Our Relationship</h2>
            <div class="content">
                <!-- Added image for content -->
                <img src="relationship_image.jpg" alt="Our Relationship">
            </div>
        </a>
        <a href="birthday/main.html" class="item">
            <h2>Happy Birthday Darling</h2>
            <div class="content">
                <!-- Added image for content -->
                <img src="birthday_image.jpg" alt="Happy Birthday Darling">
            </div>
        </a>
        <a href="valentine-week/index.html" class="item">
            <h2>Valentines Week</h2>
            <div class="content">
                <!-- Added image for content -->
                <img src="valentines_image.jpg" alt="Valentines Week">
            </div>
        </a>
    </div>
</body>
</html>
