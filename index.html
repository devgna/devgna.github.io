<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap');
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            margin: 0;
            background: url('bg.gif') no-repeat center center fixed; 
            -webkit-background-size: cover;
            -moz-background-size: cover;
            -o-background-size: cover;
            background-size: cover;
            font-family: 'Roboto', sans-serif;
            padding-top: 20px;
        }
        .button {
            border: none;
            color: white;
            text-align: center;
            display: inline-block;
            margin: 4px 2px;
            transition-duration: 0.4s;
            cursor: pointer;
            padding: 15px 32px;
            text-decoration: none;
            font-size: 16px;
            position: relative;
            overflow: hidden;
        }
        .button:before {
            content: "";
            background: rgba(255,255,255,0.5);
            position: absolute;
            top: 50%;
            left: 50%;
            width: 500px;
            height: 500px;
            transform: translate(-50%, -50%) scale(0);
            border-radius: 50%;
            transition: 0.5s ease-in-out;
        }
        .button:hover:before {
            transform: translate(-50%, -50%) scale(1);
        }
        .button1 {
            background: linear-gradient(45deg, #008CBA, #3f87a6); 
            border: 1px solid #008CBA;
        }
        .button1:hover {
            box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
        }
        .button2 {
            background: linear-gradient(45deg, #f44336, #8a2be2); 
            border: 1px solid #f44336;
        }
        .button2:hover {
            box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
        }
    </style>
</head>
<body>
    <button class="button button1" onclick="window.location.href='./love/index.html'">Home</button>
    <button class="button button2" onclick="window.location.href='./birthday/index.html'">Surprise !!</button>
</body>
</html>
